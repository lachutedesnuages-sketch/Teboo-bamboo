              - { label: "Etiqueta", name: "kicker", widget: string }
              - { label: "Título", name: "title", widget: string }
              - { label: "Texto destacado", name: "lede", widget: text }
              - { label: "Texto adicional", name: "body", widget: text }

          - label: "Trayectoria"
