backend:
  name: git-gateway
  branch: main

media_folder: "images/uploads"
public_folder: "/images/uploads"

locale: "es"

collections:
  - name: "contenido"
    label: "Contenido del sitio"
    files:
      - file: "content/es.json"
        label: "🇪🇸 Español"
        name: "es"
        fields:
          - label: "Portada (hero)"
            name: "hero"
            widget: object
            fields:
              - { label: "Texto pequeño", name: "eyebrow", widget: string }
              - { label: "Título — línea 1", name: "title_1", widget: string }
              - { label: "Título — línea 2 (cursiva)", name: "title_2", widget: string }
              - { label: "Frase de apertura", name: "tagline", widget: text }
              - { label: "Foto de apertura", name: "image", widget: image, required: false }

          - label: "El estudio"
            name: "studio"
            widget: object
